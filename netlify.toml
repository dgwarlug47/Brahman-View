[build]
base = "Code"
command = "npm run build"
publish = "dist"

[functions]
directory = "netlify/functions"
included_files = ["cache/month-lines.json"]

[functions."refresh-cache"]
schedule = "*/10 * * * *"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200